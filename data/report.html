<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #f0f0f0; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Отчёт по данным</h1>
  <p>Всего строк: <strong>50</strong></p>
  
  <h2>Числовые колонки</h2>
  <table>
    <thead>
      <tr><th>Колонка</th><th>Кол-во</th><th>Min</th><th>Max</th><th>Среднее</th></tr>
    </thead>
    <tbody>
  <tr>
    <td>price</td>
    <td>50</td>
    <td>42.31</td>
    <td>993.83</td>
    <td>468.27</td>
  </tr>
  <tr>
    <td>score</td>
    <td>50</td>
    <td>1.21</td>
    <td>10.00</td>
    <td>5.96</td>
  </tr>
  <tr>
    <td>remaining_quantity</td>
    <td>50</td>
    <td>1.00</td>
    <td>499.00</td>
    <td>207.16</td>
  </tr></tbody>
  </table>
  
  <h2>Колонка: category</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>Chancellery</td><td>23</td></tr><tr><td>Household chemicals</td><td>15</td></tr><tr><td>Food</td><td>12</td></tr></tbody>
  </table>
</body>
</html>
